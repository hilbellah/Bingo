services:
  - type: web
    name: wolastoq-bingo
    runtime: node
    # Persistent disks require a paid Render web service. This keeps the SQLite
    # database under /var/data across deploys, restarts, and idle spin-downs.
    plan: starter
    disk:
      name: bingo-data
      mountPath: /var/data
      sizeGB: 1
    # Build phase: only install deps and build the client bundle.
    # Render persistent disks are mounted at runtime, not during build.
    # Seeds do not run on deploy because seed.js drops tables.
    buildCommand: "cd client && npm install --include=dev && npm run build && cd ../server && npm install"
    # server/src/index.js runs idempotent migrations on startup. database.js
    # waits for and verifies the /var/data disk mount before writing SQLite.
    startCommand: "cd server && node src/index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ADMIN_USERNAME
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: DATABASE_URL
        value: /var/data/bingo.db
      - key: SESSION_HOLD_MINUTES
        value: "20"
      # === Authorize.Net Payment Integration ===
      # Live in production as of go-live. To revert to sandbox for testing,
      # change value to 'sandbox' and also swap the credentials in the
      # Render dashboard back to the sandbox values (the sandbox values
      # are still in server/.env locally for reference).
      - key: ANET_ENV
        value: production
      # Secrets - actual values pasted in Render dashboard, NOT committed here.
      - key: ANET_API_LOGIN_ID
        sync: false
      - key: ANET_TRANSACTION_KEY
        sync: false
      - key: ANET_SIGNATURE_KEY
        sync: false
      - key: ANET_PUBLIC_CLIENT_KEY
        sync: false
      # Public URLs for redirects/webhooks - update when moving to a custom domain.
      - key: PUBLIC_BASE_URL
        value: https://booking.wolastoqcasino.ca
      - key: ANET_RETURN_URL
        value: https://booking.wolastoqcasino.ca/payment/return
      - key: ANET_CANCEL_URL
        value: https://booking.wolastoqcasino.ca/payment/cancel
      # Currency - CAD for production (Saint Mary's is in NB).
      - key: ANET_CURRENCY
        value: CAD
      # === Postmark Email (transactional) ===
      # Primary email provider. Replaces Gmail SMTP path. Server is
      # "Wolastoq Bingo" (Server ID 19342010), DKIM-verified domain
      # wolastoqcasino.ca. Server API Token works for both REST API
      # and SMTP relay.
      # Secret - actual token pasted in Render dashboard, NOT committed.
      - key: POSTMARK_SERVER_TOKEN
        sync: false
      # Message Stream - default "outbound" is the transactional stream
      # auto-created with the server. Override only if a dedicated stream
      # is configured in Postmark.
      - key: POSTMARK_MESSAGE_STREAM
        value: outbound
      # Display name + verified sender. Must match a Postmark Sender
      # Signature or be on a DKIM-verified domain (wolastoqcasino.ca).
      - key: EMAIL_FROM
        value: "Wolastoq Bingo <noreply@wolastoqcasino.ca>"
      # Base URL used in email ticket links and verification redirects.
      - key: PUBLIC_SITE_URL
        value: https://booking.wolastoqcasino.ca
    autoDeploy: true
    healthCheckPath: /api/sessions
