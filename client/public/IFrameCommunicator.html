<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Payment Communicator</title>
  </head>
  <body>
    <script>
      (function () {
        function notifyParent(message) {
          if (
            message &&
            window.parent &&
            window.parent.parent &&
            window.parent.parent.AuthorizeNetIFrame &&
            window.parent.parent.AuthorizeNetIFrame.onReceiveCommunication
          ) {
            window.parent.parent.AuthorizeNetIFrame.onReceiveCommunication(message);
          }
        }

        function receiveMessage(event) {
          if (event && event.data) notifyParent(event.data);
        }

        if (window.addEventListener) {
          window.addEventListener('message', receiveMessage, false);
        } else if (window.attachEvent) {
          window.attachEvent('onmessage', receiveMessage);
        }

        if (window.location.hash && window.location.hash.length > 1) {
          notifyParent(window.location.hash.substring(1));
        }
      }());
    </script>
  </body>
</html>
